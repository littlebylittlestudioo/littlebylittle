<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Little by Little — ช่วงนี้ฉันดูเป็นไงบ้าง</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'PG Picasso';
      src: url('fonts/PG PicassoV2.ttf') format('truetype');
    }
    :root {
      --cream-100: #f8ebdb;
      --cream-200: #efcca4;
      --cream-400: #d6892c;
      --text: #1e1e1e;
    }
    * { font-family: 'IBM Plex Sans Thai', sans-serif; box-sizing: border-box; }
    body { margin: 0; }

    /* ══════════════════════════════════════════
       PAGE ROOT
       ══════════════════════════════════════════ */
    .page-root {
      position: relative;
      width: 100%;
      min-height: max(1283px, 100vh);
      overflow-x: hidden;
      background: linear-gradient(to bottom, #aacae5, #edeef0);
    }
    /* expand only when showing entries */
    .page-root.has-entries { min-height: max(1650px, 100vh); }

    /* ── Clouds ── */
    .cloud { position: absolute; overflow: hidden; pointer-events: none; z-index: 1; }
    .cloud img { position: absolute; max-width: none; width: 292.24%; height: 861.86%; left: -172.98%; top: -256.19%; }
    .cloud-left  { left: -66px; top: -14px; width: 532px; height: 320px; }
    .cloud-right { left: calc(75% + 39px); top: 146px; width: 352px; height: 213px; transform: scaleX(-1); }

    /* ── Generic icon button ── */
    .icon-btn {
      background: white; border-radius: 100px;
      width: 40px; height: 40px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; box-shadow: 0 4px 40px rgba(0,0,0,0.1);
      border: none; cursor: pointer; text-decoration: none;
    }
    .icon-btn img { width: 24px; height: 24px; object-fit: contain; display: block; }

    /* ══════════════════════════════════════════
       HEADER  (month title + close)
       ══════════════════════════════════════════ */
    .page-header {
      position: absolute;
      left: calc(50% - 378px); top: 88px; width: 813px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10;
    }
    .month-title {
      font-size: 32px; font-weight: 600; line-height: 40px;
      color: var(--text); margin: 0;
    }

    /* ══════════════════════════════════════════
       WEEK NAVIGATOR
       ══════════════════════════════════════════ */
    .week-nav {
      position: absolute;
      left: calc(50% - 435px); top: 144px; width: 870px;
      display: flex; align-items: center; gap: 16px;
      z-index: 10;
    }
    .week-strip {
      flex: 1; height: 122px;
      background: var(--cream-100);
      border-radius: 24px;
      display: flex; align-items: center;
      padding: 16px; gap: 16px;
      overflow: hidden;
    }
    .day-cell {
      flex: 1; height: 90px;
      background: transparent;
      border-radius: 16px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .day-cell.selected { background: var(--cream-200); }
    .day-name { font-size: 14px; font-weight: 600; line-height: 22px; color: var(--text); display: flex; align-items: center; justify-content: center; gap: 3px; }
    .day-num  { font-size: 40px; font-weight: 600; line-height: 48px; color: var(--text); }
    .day-dot  { width: 6px; height: 6px; border-radius: 50%; background: #d94f3d; flex-shrink: 0; }

    /* ══════════════════════════════════════════
       EMPTY STATE  (no entries ever)
       NOT-TODAY STATE  (entries exist but not on this date)
       — both share the same absolute position —
       ══════════════════════════════════════════ */
    .empty-state,
    .not-today-state {
      position: absolute;
      left: calc(50% - 347px); top: 485px; width: 694px;
      z-index: 10; text-align: center; color: #121212;
    }
    .not-today-state {
      display: flex; flex-direction: column; gap: 8px;
    }
    .not-today-title {
      font-size: 32px; font-weight: 600; line-height: 40px;
      color: #121212; margin: 0; width: 100%;
    }
    .not-today-subtitle {
      font-size: 16px; font-weight: 500; line-height: 24px;
      letter-spacing: -0.048px; color: #121212; margin: 0; width: 100%;
    }
    .empty-state {
      position: absolute;
      left: calc(50% - 347px); top: 485px; width: 694px;
      display: flex; flex-direction: column; align-items: center; gap: 48px;
      z-index: 10;
    }
    .empty-text {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      width: 100%; text-align: center;
    }
    .empty-title {
      font-size: 32px; font-weight: 600; line-height: 40px;
      color: #121212; margin: 0; width: 100%;
    }
    .empty-subtitle {
      font-size: 16px; font-weight: 500; line-height: 24px;
      letter-spacing: -0.048px; color: #121212; margin: 0; width: 100%;
    }
    .btn-cta {
      width: 343px; height: 48px;
      background: #000; color: white;
      border: none; border-radius: 100px; cursor: pointer;
      font-family: 'IBM Plex Sans Thai', sans-serif;
      font-size: 14px; font-weight: 600; line-height: 22px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      white-space: nowrap;
    }

    /* ══════════════════════════════════════════
       WITH-CONTENT STATE
       ══════════════════════════════════════════ */

    /* AI insight band */
    .insight-band {
      position: absolute;
      left: 0; top: 282px; width: 100%; height: 235px;
      background: linear-gradient(to right,
        rgba(248,235,219,0) 0%,
        #f8ebdb 25%,
        #f8ebdb 75%,
        rgba(248,235,219,0) 100%);
      z-index: 6;
      display: flex; align-items: center; justify-content: center;
    }
    .insight-inner { display: flex; align-items: center; gap: 29px; }
    .insight-content { width: 516px; display: flex; flex-direction: column; gap: 16px; }
    .insight-label { display: flex; align-items: center; gap: 8px; }
    .insight-label img { width: 32px; height: 32px; object-fit: contain; }
    .insight-label-text {
      font-size: 14px; font-weight: 600; line-height: 22px;
      color: var(--text); white-space: nowrap;
    }
    .insight-text {
      font-size: 16px; font-weight: 500; line-height: 24px;
      letter-spacing: -0.048px; color: #121212; margin: 0;
      white-space: pre-line;
    }
    @keyframes insight-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    .insight-text.loading {
      animation: insight-pulse 1.4s ease-in-out infinite;
      color: #9e8f82;
    }
    .insight-char { width: 212px; height: 203px; position: relative; overflow: hidden; flex-shrink: 0; }
    .insight-char img {
      position: absolute; max-width: none;
      width: 400%; height: 278.26%; left: -201.56%; top: -145.92%;
    }

    /* Journal entry cards */
    .entries-list {
      position: absolute;
      left: calc(50% - 379px); top: 573px; width: 758px;
      display: flex; flex-direction: column; gap: 16px;
      z-index: 10;
    }
    .entry-card {
      background: var(--cream-100);
      border-radius: 24px;
      flex-shrink: 0; width: 100%;
    }
    .entry-inner-border {
      display: block;
      border: 2px solid var(--cream-200); border-radius: 12.667px;
      margin: 16px;
      pointer-events: none;
    }
    .entry-content {
      padding: 14px;
      display: flex; flex-direction: column; gap: 24px;
    }
    .entry-header { display: flex; flex-direction: column; }
    .entry-arch-wrap { width: 66px; height: 66px; overflow: hidden; position: relative; flex-shrink: 0; }
    .entry-arch-inner { position: absolute; width: 66px; height: 54px; left: 0; top: 6px; overflow: hidden; }
    .entry-arch-inner img {
      position: absolute; max-width: none;
      width: 465.52%; height: 1024%; left: -251.72%; top: -924%;
    }
    .entry-question-row {
      display: flex; align-items: center; justify-content: space-between; width: 100%;
    }
    .entry-question-row .icon-btn {
      flex-shrink: 0;
      pointer-events: auto;
    }
    .entry-question {
      font-size: 24px; font-weight: 600; line-height: 32px;
      letter-spacing: -0.3px; color: var(--cream-400);
      margin: 0; flex: 1; min-width: 0; padding-right: 8px;
    }
    .entry-answer {
      font-size: 16px; font-weight: 500; line-height: 24px;
      letter-spacing: -0.048px; color: #121212; margin: 0;
    }

    /* Diary entry cards */
    .diary-section { display: flex; flex-direction: column; gap: 4px; }
    .diary-section-label {
      font-family: 'PG Picasso', sans-serif;
      font-size: 13px; color: var(--cream-200); line-height: 20px;
    }
    .diary-section-text {
      font-size: 16px; font-weight: 500; line-height: 24px;
      letter-spacing: -0.048px; color: #121212; margin: 0;
    }

    /* Landscape */
    .landscape-wrap {
      position: absolute; overflow: hidden; z-index: 5;
      left: calc(50% + 2.5px); transform: translateX(-50%);
      width: 1151px; height: 446px;
    }
    .landscape-wrap img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; pointer-events: none;
    }
    /* landscape position adapts to state */
    .landscape-empty   { top: 837px; }
    .landscape-content { top: 1230px; }

    /* ── Green toast ── */
    .toast-success {
      position: fixed;
      top: 59px;
      left: 50%; transform: translateX(-50%) translateY(-12px);
      z-index: 200;
      background: #7e8c60; color: white;
      border-radius: 100px; padding: 8px 24px;
      font-size: 15px; font-weight: 600;
      line-height: normal; letter-spacing: -0.3px;
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .toast-success.show {
      opacity: 1; pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

/* ══════════════════════════════════════════
     TABLET  768px – 1199px
     ══════════════════════════════════════════ */
  @media (min-width: 768px) and (max-width: 1199px) {
    .page-root { min-height: 100vh; }

    /* clouds */
    .cloud-left  { left: -66px; top: 0; width: 432px; height: 260px; }
    .cloud-right { left: calc(66.67% + 4px); top: 130px; width: 296px; height: 178px; }

    /* header – 24px gutter on each side */
    .page-header { left: 24px; right: 24px; top: 88px; width: auto; }

    /* week nav: no arrows, full width with 24px padding */
    .week-nav { left: 24px; right: 24px; transform: none; top: 144px; width: auto; }
    .week-nav .icon-btn { display: none; }

    /* empty / not-today states */
    .empty-state,
    .not-today-state { top: 488px; }

    /* entries list */
    .entries-list { left: 24px; right: 24px; top: 573px; width: auto; }

    /* landscape */
    .landscape-empty   { top: 1003px; }
    .landscape-content { top: 1230px; }
  }

  /* ══════════════════════════════════════════
     MOBILE  ≤ 767px
     ══════════════════════════════════════════ */
  @media (max-width: 767px) {
    .page-root { min-height: max(100vh, 924px); }
    .page-root.has-entries { min-height: max(100vh, 1100px); }

    /* clouds */
    .cloud-left  { left: -87px; top: -4px; width: 255px; height: 154px; }
    .cloud-right { left: calc(50% + 51.5px); top: 60px; width: 169px; height: 102px; }

    /* header */
    .page-header { left: 16px; top: 78px; width: calc(100% - 32px); }
    .month-title { font-size: 32px; line-height: 40px; }

    /* week nav: no arrows, compact strip */
    .week-nav { left: 8px; top: 134px; width: calc(100% - 16px); }
    .week-nav .icon-btn { display: none; }
    .week-strip { height: 92px; border-radius: 16px; padding: 13px 14px; gap: 4px; }
    .day-cell  { height: 66px; border-radius: 8px; }
    .day-name  { font-size: 12px; line-height: 20px; }
    .day-num   { font-size: 20px; line-height: 28px; }

    /* no insight band on mobile */
    .insight-band { display: none !important; }

    /* empty / not-today states */
    .empty-state,
    .not-today-state { left: 16px; top: 342px; width: calc(100% - 32px); }
    .empty-title    { font-size: 24px; line-height: 32px; letter-spacing: -0.3px; }
    .btn-cta        { width: 100%; }

    /* entry cards */
    .entries-list { left: 16px; width: calc(100% - 32px); }
    .entry-question { font-size: 20px; line-height: 28px; letter-spacing: 0; }
    .entry-answer   { font-size: 14px; font-weight: 600; line-height: 22px; letter-spacing: 0; }

    /* landscape */
    .landscape-wrap { left: calc(37.5% + 18.88px); width: 551px; height: 213px; }
    .landscape-empty   { top: 711px; }
    .landscape-content { top: 800px; }
  }
  </style>
</head>
<body>
<div class="page-root" id="page-root">

  <!-- ── Green toasts ── -->
  <div class="toast-success" id="toast-saved" role="status" aria-live="polite">
    บันทึกคำตอบสำเร็จ (-:
  </div>
  <div class="toast-success" id="toast-deleted" role="status" aria-live="polite">
    ลบคำถามสำเร็จ (-:
  </div>

  <!-- ── Clouds ── -->
  <div class="cloud cloud-left">
    <img alt="" src="assets/images/d760016f-e1f1-4707-9938-cff633a17162.png" />
  </div>
  <div class="cloud cloud-right">
    <img alt="" src="assets/images/d760016f-e1f1-4707-9938-cff633a17162.png" />
  </div>

  <!-- ══════════════════════════════════════════
       HEADER
       ══════════════════════════════════════════ -->
  <div class="page-header">
    <p class="month-title" id="month-title">กันยายน 2569</p>
    <a class="icon-btn" href="index.html" aria-label="ปิด">
      <img alt="ปิด" src="assets/icons/c9692b6f-ebb5-4fb4-b1f4-537656a97c07.svg" />
    </a>
  </div>

  <!-- ══════════════════════════════════════════
       WEEK NAVIGATOR
       ══════════════════════════════════════════ -->
  <div class="week-nav">
    <button class="icon-btn" onclick="changeWeek(-1)" aria-label="สัปดาห์ก่อนหน้า">
      <img alt="ย้อนหลัง" src="assets/icons/arrow-right.svg"
           style="transform: rotate(180deg);" />
    </button>
    <div class="week-strip" id="week-strip"></div>
    <button class="icon-btn" onclick="changeWeek(1)" aria-label="สัปดาห์ถัดไป">
      <img alt="ถัดไป" src="assets/icons/arrow-right.svg" />
    </button>
  </div>

  <!-- ══════════════════════════════════════════
       EMPTY STATE
       ══════════════════════════════════════════ -->
  <div class="empty-state" id="empty-state">
    <div class="empty-text">
      <p class="empty-title">ยังไม่มีการตอบคำถามประจำวัน (-:</p>
      <p class="empty-subtitle">ลองสุ่มคำถามประจำวันของคุณดูสิ !</p>
    </div>
    <button class="btn-cta" onclick="window.location.href='prompt.html'">สุ่มคำถามประจำวัน</button>
  </div>

  <!-- ══════════════════════════════════════════
       NOT-TODAY STATE  (selected date has no entries)
       ══════════════════════════════════════════ -->
  <div class="not-today-state" id="not-today-state" style="display:none;">
    <p class="not-today-title">ไม่มีการตอบคำถามประจำวัน (-:</p>
    <p class="not-today-subtitle">วันที่นี้คุณไม่ได้ตอบคำถามไว้</p>
  </div>

  <!-- ══════════════════════════════════════════
       WITH-CONTENT STATE
       ══════════════════════════════════════════ -->

  <!-- AI Insight band (moved to llinsight.html) -->
  <div class="insight-band" id="insight-band" style="display:none !important">
    <div class="insight-inner">
      <div class="insight-content">
        <div class="insight-label">
          <img alt="" src="assets/icons/icon-insight.svg" />
          <span class="insight-label-text">สังเกตการณ์จากแง่งขิง</span>
        </div>
        <p class="insight-text" id="insight-text">กำลังวิเคราะห์…</p>
      </div>
      <div class="insight-char">
        <img alt="" src="assets/images/61cb9cc6-a491-478a-b26d-7b3ac2d3bb20.png" />
      </div>
    </div>
  </div>

  <!-- Journal entries -->
  <div class="entries-list" id="entries-list"></div>

  <!-- ── Landscape ── -->
  <div class="landscape-wrap landscape-empty" id="landscape"></div>

</div>

<script src="sets.js"></script>
<script>
  var _thaiDays   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  var _thaiMonths = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
                     'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  var _weekOffset   = 0;
  var _selectedDate = new Date().toDateString(); /* tracks which day is active */

  /* ── Landscape image (same asset for both states) ── */
  document.getElementById('landscape').innerHTML =
    '<img alt="" src="assets/images/a8109c71-a68e-416c-82ea-7aa20b8d3d8e.png" />';

  /* ── Week navigator ── */
  function getMonday(date) {
    var d = new Date(date);
    var day = d.getDay();
    var diff = d.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(d.setDate(diff));
  }

  function renderWeek() {
    var today  = new Date();
    var monday = getMonday(today);
    monday.setDate(monday.getDate() + _weekOffset * 7);

    var buddhistYear = monday.getFullYear() + 543;
    document.getElementById('month-title').textContent =
      _thaiMonths[monday.getMonth()] + ' ' + buddhistYear;

    var strip    = document.getElementById('week-strip');
    strip.innerHTML = '';
    var todayStr = today.toDateString();
    var allEntries      = JSON.parse(localStorage.getItem('littlebylittle_entries') || '[]');
    var allDiaryEntries = JSON.parse(localStorage.getItem('littlebylittle_diary')   || '[]');

    for (var i = 0; i < 7; i++) {
      var day = new Date(monday);
      day.setDate(monday.getDate() + i);
      var isToday   = day.toDateString() === todayStr;
      var hasEntry  = allEntries.some(function (e) { return new Date(e.date).toDateString() === day.toDateString(); }) ||
                      allDiaryEntries.some(function (e) { return new Date(e.date).toDateString() === day.toDateString(); });
      var cell = document.createElement('div');
      cell.className = 'day-cell' + (isToday ? ' selected' : '');
      cell.innerHTML =
        '<span class="day-name">' + _thaiDays[day.getDay()] + (hasEntry ? '<span class="day-dot"></span>' : '') + '</span>' +
        '<span class="day-num">'  + day.getDate()            + '</span>';
      cell.dataset.date = day.toDateString();
      cell.addEventListener('click', function () {
        document.querySelectorAll('.day-cell').forEach(function (c) {
          c.classList.remove('selected');
        });
        this.classList.add('selected');
        _selectedDate = this.dataset.date;
        renderDayView();
      });
      strip.appendChild(cell);
    }
  }

  function changeWeek(dir) {
    _weekOffset += dir;
    renderWeek();
  }

  /* ── Swipe-to-change-week on touch devices ── */
  (function () {
    var strip = document.getElementById('week-strip');
    var startX = 0;
    strip.addEventListener('touchstart', function (e) {
      startX = e.touches[0].clientX;
    }, { passive: true });
    strip.addEventListener('touchend', function (e) {
      var dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) > 50) changeWeek(dx < 0 ? 1 : -1);
    }, { passive: true });
  })();

  var _isMobile = window.innerWidth < 768;

  /* ── AI Insight: fetch from local proxy, cache for 30 min ── */
  function fetchInsight() {
    if (_isMobile) return;
    var CACHE_KEY = 'littlebylittle_insight_cache';
    var CACHE_TTL = 30 * 60 * 1000; /* 30 minutes */

    var el = document.getElementById('insight-text');
    if (!el) return;

    function showInsight(text) {
      el.textContent = text;
      document.getElementById('insight-band').style.display   = 'flex';
      document.getElementById('entries-list').style.top       = '533px'; /* 282 insight top + 235 height + 16 gap */
    }

    /* Use cache if still fresh → show band immediately */
    try {
      var cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
      if (cached && (Date.now() - cached.ts) < CACHE_TTL) {
        showInsight(cached.text);
        return;
      }
    } catch (e) { /* ignore */ }

    var entries      = JSON.parse(localStorage.getItem('littlebylittle_entries') || '[]');
    var diaryEntries = JSON.parse(localStorage.getItem('littlebylittle_diary')   || '[]');
    if (!entries.length && !diaryEntries.length) return;

    fetch('/api/insight', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ entries: entries, diaryEntries: diaryEntries })
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (data.insight) {
        showInsight(data.insight);
        localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), text: data.insight }));
      }
      /* no insight → entries stay at 282px, band stays hidden */
    })
    .catch(function () {
      /* error → entries stay at 282px, band stays hidden */
    });
  }

  /* ── Section switcher ── */
  function showSection(state) {
    document.getElementById('empty-state').style.display     = state === 'global-empty' ? 'flex' : 'none';
    document.getElementById('not-today-state').style.display = state === 'not-today'    ? 'flex' : 'none';
    document.getElementById('entries-list').style.display    = state === 'content' ? 'flex' : 'none';
    document.getElementById('entries-list').style.top        = _isMobile ? '242px' : '282px';
    var landscape = document.getElementById('landscape');
    var root      = document.getElementById('page-root');
    if (state === 'content') {
      landscape.className = 'landscape-wrap landscape-content';
      root.classList.add('has-entries');
    } else {
      landscape.className = 'landscape-wrap landscape-empty';
      root.classList.remove('has-entries');
    }
  }

  /* ── Day view: pick the right state for the selected date ── */
  function renderDayView() {
    var all        = JSON.parse(localStorage.getItem('littlebylittle_entries') || '[]');
    var allDiary   = JSON.parse(localStorage.getItem('littlebylittle_diary')   || '[]');
    var dayEntries = all.filter(function (e) {
      return new Date(e.date).toDateString() === _selectedDate;
    });
    var dayDiary = allDiary.filter(function (e) {
      return new Date(e.date).toDateString() === _selectedDate;
    });
    if (dayEntries.length === 0 && dayDiary.length === 0) {
      var isToday = _selectedDate === new Date().toDateString();
      showSection(isToday ? 'global-empty' : 'not-today');
    } else {
      showSection('content');
      renderEntries(all, dayEntries, dayDiary);
    }
  }

  /* ── Entry cards (receives pre-filtered prompt + diary entries) ── */
  function renderEntries(all, saved, savedDiary) {
    var archSrc = 'assets/images/2e527e8e-7555-469c-86e6-e12bf543b7f1.png';
    var editSrc = 'assets/icons/068231a2-f61b-401c-9a40-1efa21f89a84.svg';

    var list = document.getElementById('entries-list');
    list.innerHTML = '';

    /* Prompt/answer cards */
    saved.forEach(function (entry) {
      var origIndex = all.findIndex(function (e) { return e.date === entry.date; });
      var editUrl   = 'answer.html?edit=' + origIndex;

      var card = document.createElement('div');
      card.className = 'entry-card';
      card.innerHTML =
        '<div class="entry-inner-border">' +
          '<div class="entry-content">' +
            '<div class="entry-header">' +
              '<div class="entry-arch-wrap">' +
                '<div class="entry-arch-inner"><img alt="" src="' + archSrc + '" /></div>' +
              '</div>' +
              '<div class="entry-question-row">' +
                '<p class="entry-question">' + entry.prompt + '</p>' +
                '<button class="icon-btn" aria-label="แก้ไข"' +
                  ' onclick="window.location.href=\'' + editUrl + '\'">' +
                  '<img alt="แก้ไข" src="' + editSrc + '" />' +
                '</button>' +
              '</div>' +
            '</div>' +
            '<p class="entry-answer">' + entry.answer + '</p>' +
          '</div>' +
        '</div>';
      list.appendChild(card);
    });

    /* Diary cards */
    savedDiary.forEach(function (entry) {
      var sections = '';
      if (entry.story)     sections += '<div class="diary-section"><span class="diary-section-label">Your little story</span><p class="diary-section-text">' + entry.story     + '</p></div>';
      if (entry.gratitude) sections += '<div class="diary-section"><span class="diary-section-label">Your gratitude</span><p class="diary-section-text">'     + entry.gratitude + '</p></div>';
      if (entry.care)      sections += '<div class="diary-section"><span class="diary-section-label">Your gentle care</span><p class="diary-section-text">'    + entry.care      + '</p></div>';
      if (!sections) return;

      var card = document.createElement('div');
      card.className = 'entry-card';
      card.innerHTML =
        '<div class="entry-inner-border">' +
          '<div class="entry-content">' + sections + '</div>' +
        '</div>';
      list.appendChild(card);
    });
  }

  /* ══════════════════════════════════════════
     INITIAL STATE
     ══════════════════════════════════════════ */
  function applyState() {
    renderDayView();
  }

  renderWeek();
  applyState();

  /* Show green toast on arrival from Desktop3 (save or delete) */
  (function () {
    var params    = new URLSearchParams(window.location.search);
    var toastType = params.get('toast');
    var toastId   = toastType === 'saved'   ? 'toast-saved'   :
                    toastType === 'deleted' ? 'toast-deleted' : null;
    if (toastId) {
      var toast = document.getElementById(toastId);
      if (toast) {
        requestAnimationFrame(function () {
          toast.classList.add('show');
          setTimeout(function () { toast.classList.remove('show'); }, 3000);
        });
        history.replaceState(null, '', window.location.pathname);
      }
    }
  })();
</script>
