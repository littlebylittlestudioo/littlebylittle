<!DOCTYPE html>
<html lang="th">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F367F1E8GD"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-F367F1E8GD');

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Little by Little — เข้าสู่ระบบ</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600&family=Plus+Jakarta+Sans&display=swap" rel="stylesheet" />

  <!-- ══ Firebase SDK (Google + Facebook) ══ -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="/db.js"></script>
  <!-- ══ LINE LIFF SDK ══ -->
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --cream-100: #f8ebdb; --cream-200: #efcca4; --text: #1e1e1e; }
    * { font-family: 'IBM Plex Sans Thai', sans-serif; box-sizing: border-box; }
    body { margin: 0; }

    /* ══ PAGE ROOT ══ */
    .page-root {
      position: relative; width: 100%;
      overflow-x: hidden;
      min-height: max(1283px, calc(837px + 31vw));
      background: linear-gradient(to bottom, #aacae5, #edeef0);
    }

    /* ══ CLOUDS ══ */
    .cloud { position: absolute; overflow: hidden; pointer-events: none; z-index: 1; }
    .cloud img { position: absolute; max-width: none; width: 292.24%; height: 861.86%; left: -172.98%; top: -256.19%; }
    .cloud-left  { left: -66px; top: -14px; width: 532px; height: 320px; }
    .cloud-right { left: calc(75% + 39px); top: 146px; width: 352px; height: 213px; transform: scaleX(-1); }

    /* ══ CLOSE BUTTON ══ */
    .close-btn {
      position: absolute;
      left: calc(50% + 191px); top: 120px;
      width: 40px; height: 40px;
      background: white; border-radius: 100px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.1);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 20;
    }
    .close-btn img { width: 24px; height: 24px; object-fit: contain; display: block; }

    /* ══ LOGIN CARD ══ */
    .login-card {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      top: 184px;
      width: 461px;
      background: var(--cream-100);
      border-radius: 25.333px;
      box-shadow: 0 6.333px 63.333px rgba(0,0,0,0.1);
      overflow: hidden;
      z-index: 10;
      padding: 40px;
    }
    .card-border {
      position: absolute;
      inset: 16px;
      border: 2px solid var(--cream-200);
      border-radius: 12.667px;
      pointer-events: none;
    }

    /* ── Blob character ── */
    .blob-wrap {
      position: relative;
      width: 222px; height: 237px;
      overflow: hidden; pointer-events: none;
      margin-bottom: 14px;
    }
    .blob-wrap img {
      position: absolute; max-width: none;
      width: 438.86%; height: 273.8%;
      left: -103.19%; top: -144.77%;
    }

    /* ── Text section ── */
    .card-texts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 40px; }
    .card-heading {
      font-size: 32px; font-weight: 600;
      line-height: 40px; color: var(--text); margin: 0;
    }
    .card-body {
      font-size: 14px; font-weight: 400;
      line-height: 22px; color: var(--text); margin: 0;
    }

    /* ── Login buttons ── */
    .btn-group { display: flex; flex-direction: column; gap: 8px; width: 100%; }
    .login-btn {
      width: 100%; height: 47px;
      background: white;
      border: 1px solid #000;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      gap: 8px; cursor: pointer;
      font-size: 13.8px; font-weight: 400; color: #000;
      font-family: 'Plus Jakarta Sans', 'IBM Plex Sans Thai', sans-serif;
      transition: background 0.15s;
    }
    .login-btn:hover { background: #f5f5f5; }
    .login-btn img { width: 24px; height: 24px; object-fit: contain; flex-shrink: 0; }

    /* ══ LANDSCAPE ══ */
    .landscape-wrap {
      position: absolute; left: 0; right: 0; width: 100%;
      overflow: hidden; z-index: 5;
      top: 837px; height: max(446px, 31vw);
    }
    .landscape-wrap img {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: max(1151px, 80vw); height: 100%;
      object-fit: fill; pointer-events: none;
    }

    /* ══ TABLET ══ */
    @media (min-width: 768px) and (max-width: 1199px) {
      .page-root { min-height: 100vh; background: linear-gradient(to bottom, #abcbe6, #ebedef); }
      .cloud-left  { left: -66px; top: 0; width: 432px; height: 260px; }
      .cloud-right { left: calc(66.67% + 4px); top: 130px; width: 296px; height: 178px; }
      .close-btn { left: calc(50% + 191px); top: 80px; }
      .landscape-wrap { top: calc(100vh - 220px); height: 446px; }
      .landscape-wrap img { width: 1151px; object-fit: fill; }
    }

    /* ══ MOBILE ══ */
    @media (max-width: 767px) {
      .page-root { min-height: max(100vh, 870px); background: linear-gradient(to bottom, #a9cae5, #e4e7e8); }
      .cloud-left  { left: -87px; top: -4px; width: 255px; height: 154px; }
      .cloud-right { left: calc(50% + 51.5px); top: 60px; width: 169px; height: 102px; }
      .close-btn { left: auto; right: 16px; top: 16px; }
      .login-card { width: calc(100% - 32px); top: 72px; }
      .blob-wrap { width: 160px; height: 171px; }
      .card-heading { font-size: 24px; line-height: 32px; }
      .landscape-wrap { top: calc(100vh - 213px); height: 213px; }
      .landscape-wrap img { width: 551px; object-fit: fill; }
    }
  </style>
</head>
<body>

<div class="page-root">

  <!-- Clouds -->
  <div class="cloud cloud-left">
    <img alt="" src="assets/images/3dda61fa-1d5c-4693-aac2-32b4c04117ae.png" />
  </div>
  <div class="cloud cloud-right">
    <img alt="" src="assets/images/3dda61fa-1d5c-4693-aac2-32b4c04117ae.png" />
  </div>

  <!-- Close → go back without logging in -->
  <button class="close-btn" onclick="goBack()" aria-label="ปิด">
    <img alt="close" src="assets/icons/6bb9ad69-b6c4-44a1-9521-4bb0a21bda79.svg" />
  </button>

  <!-- Login card -->
  <div class="login-card">
    <div class="card-border"></div>

    <!-- Blob reading a book -->
    <div class="blob-wrap">
      <img alt="" src="assets/images/335fe2c4-fee9-44b6-8beb-0a80bdefc18c.png" />
    </div>

    <!-- Heading + body -->
    <div class="card-texts">
      <p class="card-heading">อยากเก็บสิ่งนี้ไว้ให้คุณ</p>
      <p class="card-body">เข้าสู่ระบบหรือสมัครสมาชิกก่อนน้า<br>เพื่อให้เราช่วยบันทึกคำตอบและข้อความที่คุณชอบไว้ในพื้นที่ของคุณ</p>
    </div>

    <!-- Login buttons -->
    <div class="btn-group">
      <button class="login-btn" onclick="loginWith('line')">
        <img alt="Line" src="assets/images/7ab2c1f5-623a-4dae-a26a-3865771e6b85.png" />
        เข้าสู่ระบบด้วย Line
      </button>
      <button class="login-btn" onclick="loginWith('google')">
        <img alt="Google" src="assets/icons/18af3898-50ef-492c-a9dd-48253d4bef20.svg" />
        เข้าสู่ระบบด้วย Google
      </button>
      <button class="login-btn" onclick="loginWith('facebook')">
        <img alt="Facebook" src="assets/icons/341924f1-09da-4875-935d-57307b82abdb.svg" />
        เข้าสู่ระบบด้วย Facebook
      </button>
    </div>
  </div>

  <!-- Green mountain -->
  <div class="landscape-wrap">
    <img alt="" src="assets/images/cf5be2bf-709e-4956-b4a0-f28576e148c7.png" />
  </div>

</div>

<!-- Migration modal: shown when user has local data -->
<div id="migration-modal" style="
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.7);
  z-index:100; align-items:center; justify-content:center;
  padding:24px;
">
  <div style="
    background:var(--cream-100); border-radius:25px;
    padding:32px 24px; max-width:380px; width:100%;
    box-shadow:0 6px 60px rgba(0,0,0,0.15);
    border:2px solid var(--cream-200);
  ">
    <p style="font-size:20px;font-weight:600;line-height:28px;color:var(--text);margin:0 0 8px;">
      คุณมีบันทึกในเครื่องนี้
    </p>
    <p style="font-size:14px;font-weight:400;line-height:22px;color:var(--text);margin:0 0 24px;">
      ต้องการย้ายข้อมูลไปเก็บไว้ในบัญชีนี้ไหม?<br>
      หากย้าย ข้อมูลเก่าในบัญชีจะถูกแทนที่
    </p>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button id="btn-migrate" style="
        width:100%;height:48px;background:#000;color:#fff;
        border:none;border-radius:100px;cursor:pointer;
        font-family:'IBM Plex Sans Thai',sans-serif;
        font-size:14px;font-weight:600;
      ">ย้ายข้อมูลไปยังบัญชี</button>
      <button id="btn-cancel-login" style="
        width:100%;height:48px;background:transparent;color:var(--text);
        border:1.5px solid #ccc;border-radius:100px;cursor:pointer;
        font-family:'IBM Plex Sans Thai',sans-serif;
        font-size:14px;font-weight:500;
      ">ยกเลิกการเข้าสู่ระบบ</button>
    </div>
  </div>
</div>

<!-- Error toast -->
<div id="login-error" style="
  display:none; position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:#e88b4e; color:white; border-radius:100px; padding:10px 24px;
  font-size:14px; font-weight:600; z-index:999; white-space:nowrap;
">เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง</div>

<script src="analytics.js"></script>
<script>
  var _firebaseReady = false;
  var _liffReady     = false;
  var _pendingLogin  = null; /* queued provider click while config is loading */

  /* ── Show / hide error toast ── */
  function _showError(msg) {
    var el = document.getElementById('login-error');
    el.textContent = msg || 'เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง';
    el.style.display = 'block';
    setTimeout(function () { el.style.display = 'none'; }, 4000);
  }

  /* ── Check for local journal data (entries or diary) ── */
  function _hasLocalData() {
    try {
      var entries = JSON.parse(localStorage.getItem('littlebylittle_entries') || '[]');
      var diary   = JSON.parse(localStorage.getItem('littlebylittle_diary')   || '[]');
      return entries.length > 0 || diary.length > 0;
    } catch (e) { return false; }
  }

  /* ── Show migration modal, returns Promise<'migrate'|'cancel'> ── */
  function _showMigrationModal() {
    return new Promise(function (resolve) {
      var modal = document.getElementById('migration-modal');
      modal.style.display = 'flex';
      document.getElementById('btn-migrate').onclick = function () {
        modal.style.display = 'none';
        resolve('migrate');
      };
      document.getElementById('btn-cancel-login').onclick = function () {
        modal.style.display = 'none';
        resolve('cancel');
      };
    });
  }

  /* ── Clear local data keys (keep session/bookmark keys) ── */
  function _clearLocalData() {
    localStorage.removeItem('littlebylittle_entries');
    localStorage.removeItem('littlebylittle_diary');
    localStorage.removeItem('littlebylittle_has_entries');
    localStorage.removeItem('littlebylittle_insight_cache');
  }

  /* ── Write session keys and redirect ── */
  function _completeLogin(user, provider) {
    localStorage.setItem('littlebylittle_logged_in', '1');
    localStorage.setItem('littlebylittle_user', JSON.stringify({
      uid:      user.uid   || '',
      name:     user.name  || '',
      email:    user.email || '',
      photo:    user.photo || '',
      provider: provider
    }));
    var redirect = localStorage.getItem('littlebylittle_redirect') || 'index.html';
    localStorage.removeItem('littlebylittle_redirect');
    localStorage.removeItem('littlebylittle_back');
    window.location.href = redirect;
  }

  /* ── Persist user and redirect (async — checks for migration) ── */
  async function _afterLogin(user, provider) {
    _setBtnsDisabled(true);

    /* LINE uses LIFF (not Firebase Auth) — skip Firestore sync */
    var isFirebaseProvider = (provider === 'google' || provider === 'facebook');

    if (isFirebaseProvider && _hasLocalData()) {
      var choice = await _showMigrationModal();

      if (choice === 'cancel') {
        try { await firebase.auth().signOut(); } catch (e) {}
        _setBtnsDisabled(false);
        return;
      }

      /* choice === 'migrate': upload local data to Firestore */
      try {
        await DB.init();
        var uid     = user.uid;
        var entries = JSON.parse(localStorage.getItem('littlebylittle_entries') || '[]');
        var diary   = JSON.parse(localStorage.getItem('littlebylittle_diary')   || '[]');
        await DB.saveAllEntries(uid, entries);
        await DB.saveAllDiary(uid, diary);
        _clearLocalData();
      } catch (e) {
        console.warn('Migration to Firestore failed, proceeding anyway', e);
      }
    }

    _completeLogin(user, provider);
  }

  /* ── Disable / re-enable buttons while loading ── */
  function _setBtnsDisabled(disabled) {
    document.querySelectorAll('.login-btn').forEach(function (b) {
      b.disabled = disabled;
      b.style.opacity = disabled ? '0.5' : '1';
    });
  }

  /* ── Bootstrap: fetch config from Worker, then init SDKs ── */
  _setBtnsDisabled(true);

  fetch('/api/config')
    .then(function (r) { return r.json(); })
    .then(function (cfg) {
      /* — Firebase (Google + Facebook) — */
      var fb = cfg.firebase;
      if (fb && fb.apiKey) {
        firebase.initializeApp(fb);
        _firebaseReady = true;
      }

      /* — LINE LIFF — */
      if (cfg.liffId) {
        liff.init({ liffId: cfg.liffId })
          .then(function () {
            _liffReady = true;
            /* Handle redirect-back from LINE login */
            if (liff.isLoggedIn()) {
              liff.getProfile().then(function (profile) {
                _afterLogin({
                  uid:   profile.userId,
                  name:  profile.displayName,
                  email: '',
                  photo: profile.pictureUrl
                }, 'line');
              });
              return; /* don't re-enable buttons; we're redirecting */
            }
            _setBtnsDisabled(false);
            if (_pendingLogin) { loginWith(_pendingLogin); _pendingLogin = null; }
          })
          .catch(function (e) {
            console.warn('LIFF init error', e);
            _setBtnsDisabled(false);
          });
      } else {
        _setBtnsDisabled(false);
        if (_pendingLogin) { loginWith(_pendingLogin); _pendingLogin = null; }
      }
    })
    .catch(function (e) {
      console.warn('Config fetch error', e);
      _showError('ไม่สามารถโหลดการตั้งค่าได้ กรุณาลองรีเฟรชหน้าใหม่');
      _setBtnsDisabled(false);
    });

  /* ══ LOGIN FUNCTIONS ══ */

  function loginWith(provider) {
    trackEvent('click_login', { button_name: provider });
    /* If config hasn't loaded yet, queue the click */
    if (!_firebaseReady && !_liffReady && provider !== 'line') {
      _pendingLogin = provider; return;
    }
    if (provider === 'line')     { loginWithLine();     return; }
    if (provider === 'google')   { loginWithGoogle();   return; }
    if (provider === 'facebook') { loginWithFacebook(); return; }
  }

  /* ── LINE (via LIFF) ── */
  function loginWithLine() {
    if (!_liffReady) {
      _pendingLogin = 'line';
      _showError('LINE Login กำลังเตรียมพร้อม…');
      return;
    }
    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: window.location.href });
    }
  }

  /* ── Google (via Firebase popup) ── */
  function loginWithGoogle() {
    if (!_firebaseReady) {
      _showError('Google Login ยังไม่พร้อม กรุณาตรวจสอบการตั้งค่า Firebase');
      return;
    }
    var provider = new firebase.auth.GoogleAuthProvider();
    firebase.auth().signInWithPopup(provider)
      .then(function (result) {
        var u = result.user;
        _afterLogin({ uid: u.uid, name: u.displayName, email: u.email, photo: u.photoURL }, 'google');
      })
      .catch(function (e) {
        console.error(e);
        _showError('Google Login ล้มเหลว: ' + e.message);
      });
  }

  /* ── Facebook (via Firebase popup) ── */
  function loginWithFacebook() {
    if (!_firebaseReady) {
      _showError('Facebook Login ยังไม่พร้อม กรุณาตรวจสอบการตั้งค่า Firebase');
      return;
    }
    var provider = new firebase.auth.FacebookAuthProvider();
    firebase.auth().signInWithPopup(provider)
      .then(function (result) {
        var u = result.user;
        _afterLogin({ uid: u.uid, name: u.displayName, email: u.email, photo: u.photoURL }, 'facebook');
      })
      .catch(function (e) {
        console.error(e);
        _showError('Facebook Login ล้มเหลว: ' + e.message);
      });
  }

  /* ── Close button ── */
  function goBack() {
    var back = localStorage.getItem('littlebylittle_back') || 'index.html';
    localStorage.removeItem('littlebylittle_back');
    localStorage.removeItem('littlebylittle_redirect');
    window.location.href = back;
  }
</script>
</body>
</html>
