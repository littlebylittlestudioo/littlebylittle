<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Little by Little — วันนี้ของฉัน</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root { --cream-100: #f8ebdb; --cream-200: #efcca4; --text: #1e1e1e; }
    * { font-family: 'IBM Plex Sans Thai', sans-serif; box-sizing: border-box; }
    body { margin: 0; }

    .page-root {
      position: relative; width: 100%; overflow-x: hidden;
      min-height: max(1460px, calc(837px + 31vw));
      background: linear-gradient(to bottom, #aacae5, #edeef0);
    }

    /* ── Clouds ── */
    .cloud { position: absolute; overflow: hidden; pointer-events: none; z-index: 1; }
    .cloud img { position: absolute; max-width: none; width: 292.24%; height: 861.86%; left: -172.98%; top: -256.19%; }
    .cloud-left  { left: -66px; top: -14px; width: 532px; height: 320px; }
    .cloud-right { left: calc(75% + 39px); top: 146px; width: 352px; height: 213px; transform: scaleX(-1); }

    /* ── Header ── */
    .page-header {
      position: absolute;
      top: 123px; left: 50%; transform: translateX(-50%);
      width: 865px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 10;
    }
    .page-title {
      font-size: 32px; font-weight: 600; line-height: 40px;
      color: var(--text); margin: 0;
    }
    .close-btn {
      width: 40px; height: 40px; flex-shrink: 0;
      background: white; border-radius: 100px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.1);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn img { width: 24px; height: 24px; object-fit: contain; display: block; }

    /* ── Card grid ── */
    .diary-grid {
      position: absolute;
      top: 179px; left: 50%; transform: translateX(-50%);
      width: 865px;
      display: grid;
      grid-template-columns: 424px 424px;
      gap: 16px 17px;
      z-index: 10;
    }

    .diary-card {
      background: var(--cream-100);
      border-radius: 24px;
      padding: 32px;
      position: relative;
      display: flex; flex-direction: column;
      box-shadow: 0 4px 40px rgba(0,0,0,0.06);
    }
    .card-border {
      position: absolute; inset: 16px;
      border: 2px solid var(--cream-200);
      border-radius: 14px; pointer-events: none;
    }
    .card-label {
      font-size: 14px; font-weight: 400; color: var(--cream-200);
      line-height: 21px; display: block; margin-bottom: 8px;
    }
    .card-question {
      font-size: 24px; font-weight: 600; line-height: 32px;
      color: var(--text); margin: 0 0 8px 0;
    }

    /* ── Text input area ── */
    .card-input-wrap { }
    .card-input {
      width: 100%; background: none; border: none; outline: none;
      resize: none; overflow: hidden;
      font-size: 16px; font-weight: 500; line-height: 24px;
      letter-spacing: -0.048px;
      font-family: 'IBM Plex Sans Thai', sans-serif;
      color: #121212; padding: 0;
      min-height: 28px;
    }
    .card-input::placeholder { color: var(--cream-200); font-weight: 400; font-size: 14px; }
    .card-line { width: 100%; height: 1.5px; background: var(--cream-200); margin-top: 2px; }

    /* ── Memory card ── */
    .upload-label {
      display: inline-flex; align-items: center; gap: 6px;
      cursor: pointer; margin-top: 16px;
    }
    .upload-label span { font-size: 14px; font-weight: 600; color: var(--text); line-height: 22px; }
    .upload-label input { display: none; }

    .photo-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .photo-thumb {
      width: 80px; height: 80px;
      background: var(--cream-200);
      border-radius: 8px;
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-thumb .remove-photo {
      position: absolute; top: 4px; right: 4px;
      width: 20px; height: 20px;
      background: rgba(0,0,0,0.45); border: none; cursor: pointer;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
    }

    /* ── Save button ── */
    .save-btn-wrap {
      position: absolute;
      top: 679px; left: 50%; transform: translateX(-50%);
      z-index: 10;
    }
    .save-btn {
      width: 650px; height: 48px;
      background: #000; border-radius: 100px; border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      font-size: 14px; font-weight: 600; color: white;
      font-family: 'IBM Plex Sans Thai', sans-serif;
    }
    .save-btn:active { opacity: 0.85; }

    /* ── Toast ── */
    .toast-warning {
      position: fixed;
      top: 48px; left: 50%; transform: translateX(-50%) translateY(-12px);
      z-index: 200;
      background: #e88b4e; color: white;
      border-radius: 100px; padding: 8px 24px;
      font-size: 16px; font-weight: 500;
      line-height: 24px; letter-spacing: -0.048px;
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .toast-warning.show {
      opacity: 1; pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Character ── */
    .character-wrap {
      position: absolute;
      left: calc(50% - 335px); top: 796px;
      width: 205px; height: 213px;
      z-index: 6; pointer-events: none;
    }
    .character-wrap img { width: 100%; height: 100%; object-fit: cover; object-position: center; }

    /* ── Landscape ── */
    .landscape-wrap {
      position: absolute; left: 0; right: 0; width: 100%;
      overflow: hidden; z-index: 5;
      top: 837px; height: max(446px, 31vw);
    }
    .landscape-wrap img {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: max(1151px, 80vw); height: 100%;
      object-fit: fill; pointer-events: none;
    }

    /* ══ TABLET ══ */
    @media (min-width: 768px) and (max-width: 1199px) {
      .cloud-left  { left: -66px; top: 0; width: 432px; height: 260px; }
      .cloud-right { left: calc(66.67% + 4px); top: 130px; width: 296px; height: 178px; }
      .page-header { width: calc(100% - 48px); top: 80px; }
      .page-title  { font-size: 28px; }
      .diary-grid  { width: calc(100% - 48px); top: 140px; grid-template-columns: 1fr 1fr; gap: 12px; }
      .save-btn    { width: min(650px, calc(100vw - 48px)); }
      .landscape-wrap { height: 446px; }
      .landscape-wrap img { width: 1151px; object-fit: fill; }
    }

    /* ══ MOBILE ══ */
    @media (max-width: 767px) {
      .cloud-left  { left: -87px; top: -4px; width: 255px; height: 154px; }
      .cloud-right { left: calc(50% + 51.5px); top: 60px; width: 169px; height: 102px; }
      .page-header { width: calc(100% - 32px); top: 16px; }
      .page-title  { font-size: 24px; }
      .diary-grid  { width: calc(100% - 32px); top: 76px; grid-template-columns: 1fr; gap: 12px; }
      .diary-card  { }
      .card-question { font-size: 20px; }
      .save-btn    { width: calc(100vw - 48px); }
      .character-wrap { left: 50%; transform: translateX(-50%); }
      .landscape-wrap { height: 213px; }
      .landscape-wrap img { width: 551px; object-fit: fill; }
    }
  </style>
</head>
<body>
<div class="page-root" id="page-root">

  <!-- Clouds -->
  <div class="cloud cloud-left">
    <img alt="" src="assets/images/cb1fe19d-d7ba-4c32-a438-6df8aed7b4b9.png" />
  </div>
  <div class="cloud cloud-right">
    <img alt="" src="assets/images/cb1fe19d-d7ba-4c32-a438-6df8aed7b4b9.png" />
  </div>

  <!-- Header -->
  <div class="page-header">
    <p class="page-title" id="page-title">วันนี้ของ, ฉัน</p>
    <button class="close-btn" onclick="window.location.href='index.html'" aria-label="ปิด">
      <img alt="close" src="assets/icons/35bf4632-c3e6-442b-a180-b2c58c5fa1b1.svg" />
    </button>
  </div>

  <!-- 2×2 diary cards -->
  <div class="diary-grid" id="diary-grid">

    <!-- Card 1: Your little story -->
    <div class="diary-card">
      <div class="card-border"></div>
      <span class="card-label">Your little story</span>
      <p class="card-question">เราอยู่ตรงนี้นะ<br>จะเล่าอะไรก็ได้เลย</p>
      <div class="card-input-wrap">
        <textarea class="card-input" id="input-story" placeholder="ลองเล่าจากเรื่องเล็ก ๆ ก็พอ" rows="1"></textarea>
        <div class="card-line"></div>
      </div>
    </div>

    <!-- Card 2: Your gratitude -->
    <div class="diary-card">
      <div class="card-border"></div>
      <span class="card-label">Your gratitude</span>
      <p class="card-question">วันนี้ฉันยังขอบคุณ<br>อะไรได้หนึ่งอย่าง?</p>
      <div class="card-input-wrap">
        <textarea class="card-input" id="input-gratitude" placeholder="หนึ่งสิ่งเล็ก ๆ ที่ยังดีอยู่ในวันนี้" rows="1"></textarea>
        <div class="card-line"></div>
      </div>
    </div>

    <!-- Card 3: Your gentle care -->
    <div class="diary-card">
      <div class="card-border"></div>
      <span class="card-label">Your gentle care</span>
      <p class="card-question">สิ่งเล็ก ๆ ที่ฉันจะทำ<br>เพื่อตัวเองคืออะไร?</p>
      <div class="card-input-wrap">
        <textarea class="card-input" id="input-care" placeholder="สิ่งเล็ก ๆ ที่อยากทำเพื่อตัวเอง" rows="1"></textarea>
        <div class="card-line"></div>
      </div>
    </div>

    <!-- Card 4: Your memory -->
    <div class="diary-card">
      <div class="card-border"></div>
      <span class="card-label">Your memory</span>
      <p class="card-question">ภาพถ่ายความ<br>ทรงจำของวันนี้</p>
      <label class="upload-label">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 11v2a1 1 0 001 1h10a1 1 0 001-1v-2M8 2v8M5 5l3-3 3 3" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>ภาพถ่ายของวันนี้</span>
        <input type="file" id="input-photo" accept="image/*" multiple onchange="addPhotos(this)" />
      </label>
      <div class="photo-grid" id="photo-grid"></div>
    </div>

  </div>

  <!-- Toast -->
  <div class="toast-warning" id="toast" role="alert" aria-live="polite">คุณยังไม่ได้ตอบคำถามประจำวัน (-:</div>

  <!-- Save button -->
  <div class="save-btn-wrap" id="save-btn-wrap">
    <button class="save-btn" onclick="saveDiary()">บันทึกวันนี้ไว้</button>
  </div>

  <!-- Character -->
  <div class="character-wrap" id="character-wrap">
    <img alt="" src="assets/images/diary-character.png" />
  </div>

  <!-- Green mountain -->
  <div class="landscape-wrap" id="landscape-wrap">
    <img alt="" src="assets/images/966dadc1-42f4-4ab7-b169-2e91c12b6f7b.png" />
  </div>

</div>

<script>
  /* ── User name ── */
  (function() {
    try {
      var user = JSON.parse(localStorage.getItem('littlebylittle_user') || '{}');
      if (user.name) document.getElementById('page-title').textContent = 'วันนี้ของ, ' + user.name;
    } catch(e) {}
  })();

  /* ── Auto-resize textareas + reflow ── */
  document.querySelectorAll('.card-input').forEach(function(ta) {
    ta.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
      repositionLayout();
    });
  });

  /* ── Photo handling ── */
  var photos = [];

  function addPhotos(input) {
    Array.from(input.files).forEach(function(file) {
      if (photos.length >= 4) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        photos.push(e.target.result);
        renderPhotos();
      };
      reader.readAsDataURL(file);
    });
    input.value = '';
  }

  function removePhoto(idx) {
    photos.splice(idx, 1);
    renderPhotos();
  }

  function renderPhotos() {
    var grid = document.getElementById('photo-grid');
    grid.innerHTML = photos.map(function(src, i) {
      return '<div class="photo-thumb">' +
        '<img src="' + src + '" alt="" />' +
        '<button class="remove-photo" onclick="removePhoto(' + i + ')" aria-label="ลบรูป">' +
        '<svg width="10" height="10" viewBox="0 0 10 10" fill="none">' +
        '<path d="M1 1l8 8M9 1L1 9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>' +
        '</svg></button>' +
        '</div>';
    }).join('');
    repositionLayout();
  }

  /* ── Dynamic layout repositioning ── */
  function repositionLayout() {
    var grid       = document.getElementById('diary-grid');
    var btnWrap    = document.getElementById('save-btn-wrap');
    var charWrap   = document.getElementById('character-wrap');
    var landscape  = document.getElementById('landscape-wrap');
    var pageRoot   = document.getElementById('page-root');

    var gridBottom = grid.offsetTop + grid.offsetHeight;
    var btnTop     = gridBottom + 24;
    var charTop    = Math.max(btnTop + 60, btnTop + 60);
    var landTop    = Math.max(837, charTop + 30);

    btnWrap.style.top   = btnTop  + 'px';
    charWrap.style.top  = charTop + 'px';
    landscape.style.top = landTop + 'px';
    pageRoot.style.minHeight = Math.max(1460, landTop + 500) + 'px';
  }

  /* ── Toast ── */
  var _toastTimer = null;
  function showToast() {
    var toast = document.getElementById('toast');
    toast.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(function() { toast.classList.remove('show'); }, 3000);
  }

  /* ── Save diary entry ── */
  function saveDiary() {
    var story     = document.getElementById('input-story').value.trim();
    var gratitude = document.getElementById('input-gratitude').value.trim();
    var care      = document.getElementById('input-care').value.trim();

    if (!story && !gratitude && !care && photos.length === 0) {
      showToast();
      return;
    }

    var entry = {
      date:      new Date().toISOString(),
      story:     story,
      gratitude: gratitude,
      care:      care,
      photos:    photos.slice()
    };
    try {
      var entries = JSON.parse(localStorage.getItem('littlebylittle_diary') || '[]');
      entries.unshift(entry);
      localStorage.setItem('littlebylittle_diary', JSON.stringify(entries));
    } catch(e) {}
    window.location.href = 'index.html';
  }

  /* ── Init ── */
  repositionLayout();
</script>
</body>
</html>
