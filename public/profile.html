<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Little by Little — โปรไฟล์</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root { --cream-100: #f8ebdb; --cream-200: #efcca4; --text: #1e1e1e; }
    * { font-family: 'IBM Plex Sans Thai', sans-serif; box-sizing: border-box; }
    body { margin: 0; }

    /* ══ PAGE ROOT ══ */
    .page-root {
      position: relative; width: 100%; overflow-x: hidden;
      min-height: max(1283px, calc(837px + 31vw));
      background: linear-gradient(to bottom, #aacae5, #edeef0);
    }

    /* ══ CLOUDS ══ */
    .cloud { position: absolute; overflow: hidden; pointer-events: none; z-index: 1; }
    .cloud img { position: absolute; max-width: none; width: 292.24%; height: 861.86%; left: -172.98%; top: -256.19%; }
    .cloud-left  { left: -66px; top: -14px; width: 532px; height: 320px; }
    .cloud-right { left: calc(75% + 39px); top: 146px; width: 352px; height: 213px; transform: scaleX(-1); }

    /* ══ CLOSE BUTTON ══ */
    .close-btn {
      position: absolute;
      left: calc(50% + 191px); top: 120px;
      width: 40px; height: 40px;
      background: white; border-radius: 100px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.1);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 20;
    }
    .close-btn img { width: 24px; height: 24px; object-fit: contain; display: block; }

    /* ══ PROFILE CARD ══ */
    .profile-card {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      top: 184px;
      width: 461px; height: 653px;
      background: var(--cream-100);
      border-radius: 25.333px;
      box-shadow: 0 6.333px 63.333px rgba(0,0,0,0.1);
      overflow: hidden;
      z-index: 10;
    }
    .card-border {
      position: absolute;
      inset: 16px;
      border: 2px solid var(--cream-200);
      border-radius: 12.667px;
      pointer-events: none;
    }

    /* ── Profile photo ── */
    .photo-wrap {
      position: absolute;
      left: 174px; top: 48px;
      width: 120px; height: 120px;
      border-radius: 100px;
      overflow: hidden;
    }
    .photo-wrap img#profile-photo {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      border-radius: 100px;
    }
    .edit-icon {
      position: absolute;
      left: 40px; top: 40px;
      width: 40px; height: 40px;
      background: white; border-radius: 100px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.1);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .edit-icon img { width: 24px; height: 24px; object-fit: contain; display: block; }

    /* ── Editable name ── */
    .name-value-wrap { position: relative; }
    .name-edit-hint {
      font-size: 11px; color: #b0936e; margin-top: 2px;
      text-align: center; display: block;
    }
    #name-input {
      font-size: 16px; font-weight: 500;
      line-height: 24px; letter-spacing: -0.048px;
      color: #121212; background: transparent;
      border: none; border-bottom: 2px solid var(--cream-400, #d6892c);
      outline: none; text-align: center;
      width: 100%; padding: 0;
      font-family: 'IBM Plex Sans Thai', sans-serif;
      display: none;
    }

    /* ── Name section ── */
    .name-section {
      position: absolute;
      left: 89px; top: 200px;
      width: 284px;
      display: flex; flex-direction: column; gap: 32px;
    }
    .name-block { display: flex; flex-direction: column; gap: 8px; }
    .name-label {
      font-size: 24px; font-weight: 600;
      line-height: 32px; letter-spacing: -0.3px;
      color: var(--text); text-align: center; margin: 0;
    }
    .name-value-wrap {
      display: flex; flex-direction: column; align-items: center;
    }
    .name-value {
      font-size: 16px; font-weight: 500;
      line-height: 24px; letter-spacing: -0.048px;
      color: #121212; margin: 0; white-space: nowrap;
    }
    .name-line {
      width: 100%; height: 1px;
      background: #d6bb99; margin-top: 2px;
    }

    /* ── Menu items ── */
    .menu-list {
      display: flex; flex-direction: column; gap: 16px;
    }
    .menu-item {
      display: flex; align-items: center; gap: 11px;
      cursor: pointer;
    }
    .menu-item:hover { opacity: 0.75; }
    .menu-icon {
      width: 40px; height: 40px; flex-shrink: 0;
      background: white; border-radius: 100px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.1);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .menu-icon img { width: 24px; height: 24px; object-fit: contain; display: block; }
    .menu-label {
      font-size: 16px; font-weight: 500;
      line-height: 24px; letter-spacing: -0.048px;
      color: #121212; margin: 0; white-space: nowrap;
    }

    /* ── Logout ── */
    .logout-row {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      top: 565px;
      display: flex; align-items: center; gap: 11px;
      cursor: pointer;
    }
    .logout-row:hover { opacity: 0.75; }
    .logout-icon {
      width: 40px; height: 40px;
      background: white; border-radius: 100px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.1);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .logout-icon img { width: 24px; height: 24px; object-fit: contain; display: block; }
    .logout-label {
      font-size: 16px; font-weight: 500;
      line-height: 24px; letter-spacing: -0.048px;
      color: #121212; margin: 0; white-space: nowrap;
    }

    /* ══ LANDSCAPE ══ */
    .landscape-wrap {
      position: absolute; left: 0; right: 0; width: 100%;
      overflow: hidden; z-index: 5;
      top: 837px; height: max(446px, 31vw);
    }
    .landscape-wrap img {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: max(1151px, 80vw); height: 100%;
      object-fit: fill; pointer-events: none;
    }

    /* ══ TABLET ══ */
    @media (min-width: 768px) and (max-width: 1199px) {
      .page-root { min-height: 100vh; background: linear-gradient(to bottom, #abcbe6, #ebedef); }
      .cloud-left  { left: -66px; top: 0; width: 432px; height: 260px; }
      .cloud-right { left: calc(66.67% + 4px); top: 130px; width: 296px; height: 178px; }
      .close-btn { left: calc(50% + 191px); top: 80px; }
      .landscape-wrap { top: calc(100vh - 220px); height: 446px; }
      .landscape-wrap img { width: 1151px; object-fit: fill; }
    }

    /* ══ MOBILE ══ */
    @media (max-width: 767px) {
      .page-root { min-height: max(100vh, 870px); background: linear-gradient(to bottom, #a9cae5, #e4e7e8); }
      .cloud-left  { left: -87px; top: -4px; width: 255px; height: 154px; }
      .cloud-right { left: calc(50% + 51.5px); top: 60px; width: 169px; height: 102px; }
      .close-btn { left: auto; right: 16px; top: 16px; }
      .profile-card { width: calc(100% - 32px); height: auto; top: 72px; padding-bottom: 40px; }
      .photo-wrap { left: 50%; transform: translateX(-50%); }
      .name-section { left: 50%; transform: translateX(-50%); top: 200px; width: calc(100% - 80px); align-items: center; }
      .landscape-wrap { top: calc(100vh - 213px); height: 213px; }
      .landscape-wrap img { width: 551px; object-fit: fill; }
    }
  </style>
</head>
<body>

<div class="page-root">

  <!-- Clouds -->
  <div class="cloud cloud-left">
    <img alt="" src="assets/icons/78d83ed4-a0dc-4e60-a4cd-94e01f7849b6.png" />
  </div>
  <div class="cloud cloud-right">
    <img alt="" src="assets/icons/78d83ed4-a0dc-4e60-a4cd-94e01f7849b6.png" />
  </div>

  <!-- Close → back to Desktop1 -->
  <button class="close-btn" onclick="window.location.href='index.html'" aria-label="ปิด">
    <img alt="close" src="assets/icons/003dd41d-af02-4a6f-9618-fe5d4029f9f6.png" />
  </button>

  <!-- Profile card -->
  <div class="profile-card">
    <div class="card-border"></div>

    <!-- Profile photo + edit icon -->
    <div class="photo-wrap" onclick="document.getElementById('photo-input').click()" style="cursor:pointer;">
      <img id="profile-photo" alt="profile" src="" />
      <div class="edit-icon">
        <img alt="edit" src="assets/icons/961b6604-0bb3-45ae-be2d-e6fca1b98098.png" />
      </div>
    </div>
    <input id="photo-input" type="file" accept="image/*" style="display:none"
           onchange="handlePhotoChange(event)" />

    <!-- Name + menu -->
    <div class="name-section">
      <!-- Name block -->
      <div class="name-block">
        <p class="name-label">ชื่อผู้ใช้งาน</p>
        <div class="name-value-wrap" onclick="startEditName()">
          <p class="name-value" id="profile-name">—</p>
          <input id="name-input" type="text" maxlength="40"
                 onblur="saveEditName()" onkeydown="if(event.key==='Enter'){this.blur()}" />
          <div class="name-line"></div>
          <span class="name-edit-hint" id="edit-hint">แตะเพื่อแก้ไขชื่อ</span>
        </div>
      </div>

      <!-- Menu items -->
      <div class="menu-list">
        <div class="menu-item" onclick="window.location.href='insight.html'">
          <div class="menu-icon">
            <img alt="" src="assets/icons/8a8d25d0-2f6b-4a49-9cdf-79b7ba37cfbf.png" />
          </div>
          <p class="menu-label">ข้อความที่บันทึกไว้</p>
        </div>
        <div class="menu-item" onclick="window.open('https://forms.gle/Bg4tTuAvMZqPfoMW9','_blank')">
          <div class="menu-icon">
            <img alt="" src="assets/icons/477aeb67-879a-4f99-93a4-c2149aef119b.png" />
          </div>
          <p class="menu-label">ฟีดเบคงานใช้งาน</p>
        </div>
        <div class="menu-item" onclick="window.location.href='donate.html'">
          <div class="menu-icon">
            <img alt="" src="assets/icons/16fcd9c6-806f-4ee4-ba4d-9d4ffca4012d.png" />
          </div>
          <p class="menu-label">สนับสนุนทีมงาน Littlebylittle</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Green mountain -->
  <div class="landscape-wrap">
    <img alt="" src="assets/icons/8019edb6-39ed-4ad0-af05-500b0e660659.png" />
  </div>

</div>

<script>
  /* ── Load user info from localStorage ── */
  (function () {
    var raw = localStorage.getItem('littlebylittle_user');
    var isGuest = !raw;

    if (!isGuest) {
      try {
        var user = JSON.parse(raw);
        document.getElementById('profile-name').textContent = user.name || '—';
        if (user.photo) {
          document.getElementById('profile-photo').src = user.photo;
        }
      } catch (e) { isGuest = true; }
    }

    if (isGuest) {
      document.getElementById('profile-name').textContent = 'ผู้ใช้ทั่วไป';
      var row = document.querySelector('.logout-row');
      if (row) row.style.display = 'none';
    }
  })();

  /* ── Profile photo picker ── */
  function handlePhotoChange(event) {
    var file = event.target.files && event.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function (e) {
      var img = new Image();
      img.onload = function () {
        /* Resize to max 300×300 to keep localStorage small */
        var MAX = 300;
        var scale = Math.min(MAX / img.width, MAX / img.height, 1);
        var canvas = document.createElement('canvas');
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        document.getElementById('profile-photo').src = dataUrl;
        try {
          var raw  = localStorage.getItem('littlebylittle_user');
          var user = raw ? JSON.parse(raw) : {};
          user.photo = dataUrl;
          localStorage.setItem('littlebylittle_user', JSON.stringify(user));
        } catch (e) {}
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    event.target.value = '';
  }

  /* ── Editable name ── */
  function startEditName() {
    var p     = document.getElementById('profile-name');
    var input = document.getElementById('name-input');
    var hint  = document.getElementById('edit-hint');
    if (input.style.display === 'block') return;
    input.value = p.textContent === 'ผู้ใช้ทั่วไป' ? '' : p.textContent;
    input.placeholder = 'ใส่ชื่อของคุณ';
    p.style.display    = 'none';
    hint.style.display = 'none';
    input.style.display = 'block';
    input.focus();
  }

  function saveEditName() {
    var p     = document.getElementById('profile-name');
    var input = document.getElementById('name-input');
    var hint  = document.getElementById('edit-hint');
    var name  = input.value.trim() || 'ผู้ใช้ทั่วไป';
    p.textContent = name;
    input.style.display = 'none';
    hint.style.display  = 'block';
    p.style.display     = 'block';
    /* Save to localStorage */
    try {
      var raw  = localStorage.getItem('littlebylittle_user');
      var user = raw ? JSON.parse(raw) : {};
      user.name = name;
      localStorage.setItem('littlebylittle_user', JSON.stringify(user));
    } catch (e) {}
  }

  /* ── Logout ── */
  function logout() {
    localStorage.removeItem('littlebylittle_logged_in');
    localStorage.removeItem('littlebylittle_user');
    localStorage.removeItem('littlebylittle_provider');
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
