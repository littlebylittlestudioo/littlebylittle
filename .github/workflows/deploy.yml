name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '24'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy public --project-name=littlebylittle --account-id=ffe8bc3b0c0ed2e8103b3b81aa60f7ed
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
